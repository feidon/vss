schema: spec-driven

context: |
  ## Project
  Vehicle Scheduling System (VSS) backend — manages railway vehicle services on a fixed
  track network with stations, platforms, blocks, and interlocking constraints.

  ## Tech Stack
  - Python 3.14 + FastAPI 0.135
  - PostgreSQL 17 (Docker)
  - SQLAlchemy Core 2.0 + manual mapper (no ORM)
  - Alembic for schema migrations
  - asyncpg for async database access
  - Package manager: uv
  - Linting: Ruff, import-linter (enforces architecture)
  - Testing: pytest + pytest-asyncio, testcontainers[postgres]

  ## Architecture
  Hexagonal Architecture (Ports & Adapters) with DDD.
  Dependency flow: api/ → application/ → domain/ ← infra/
  - api/: FastAPI routes, Pydantic schemas, DI container (inbound adapter)
  - application/: App services, DTOs, orchestration (use cases)
  - domain/: Entities, value objects, repository interfaces (ports), domain services (core)
  - infra/postgres/: PostgreSQL repository implementations, seed data (outbound adapter)
  - tests/: Mirrors source structure (domain/, application/, api/, infra/)
  - tests/fakes/: In-memory repository implementations (test doubles)

  ## Domain Model
  - Block: track segment with traversal_time_seconds and optional interlocking group (1-3)
  - Station: has platforms (2 each); Yard (Y) is special depot station
  - Platform: P1A, P1B, P2A, P2B, P3A, P3B
  - Service: scheduled vehicle run with path (nodes) and timetable (arrival/departure), stored as JSONB
  - Vehicle: V1, V2, V3 — battery mgmt: charge(), traverse_block(), can_depart(), is_battery_critical()
  - Node (value object): point in the network (BLOCK, PLATFORM, or YARD)
  - NodeConnection (value object): directed edge in the track graph
  - TimetableEntry (value object): order + node_id + arrival/departure times (Unix epoch seconds)

  ## Key Domain Services
  - ConflictDetectionService: sweep-line + simulation for vehicle, block, interlocking, battery conflicts
  - RouteFinder: BFS pathfinding to insert intermediate blocks between platform stops

  ## API Endpoints (all under /api prefix)
  - GET /api/blocks, PATCH /api/blocks/{id}
  - POST /api/services, GET /api/services (includes start_time, origin_name, destination_name), GET /api/services/{id} (includes graph), PATCH /api/services/{id}/route, DELETE /api/services/{id}
  - POST /api/routes/validate
  - GET /api/vehicles
  - Route update returns 409 with structured conflict details

  ## Persistence Strategy
  - SQLAlchemy Core + manual _to_entity() / _to_table() mappers in repositories
  - Domain entities are pure Python dataclasses with zero SQLAlchemy imports
  - Repositories use explicit create() and update() — no generic save() or upsert
  - Reference data repos (Block, Vehicle, Station) only expose update() — creation via seed migrations
  - Service path/timetable stored as JSONB (aggregate storage)

  ## Conventions
  - Conventional commits: feat, fix, refactor, docs, test, chore, perf, ci
  - PEP 8 naming (snake_case), Ruff for formatting (line-length 88)
  - TDD: write tests first, then implement
  - Domain entities may use mutation (e.g., Vehicle.charge()) — this is acceptable
  - Pure domain services: no repository dependencies, no I/O
  - Tests: domain = pure unit, application = async with in-memory repos, api/infra = @pytest.mark.postgres
  - Helper factories: make_block(), make_service_with_window(), seed data utilities

  ## Track Network
  14 blocks (B1-B14), 4 stations (Y, S1, S2, S3), 6 platforms.
  Directed adjacency (-> = unidirectional, <- = bidirectional):
      Y  <- B1  -> P1A
      Y  <- B2  -> P1B
      P1A -> B3  -> B5  -> P2A
      P1B -> B4  -> B5  -> P2A
      P2A -> B6  -> B7  -> P3A
      P2A -> B6  -> B8  -> P3B
      P3A -> B10 -> B11 -> P2B
      P3B -> B9  -> B11 -> P2B
      P2B -> B12 -> B14 -> P1B
      P2B -> B12 -> B13 -> P1A
  B1/B2 are bidirectional (vehicles depart from and return to Yard).
  All other blocks are strictly unidirectional.
  Three interlocking groups enforce mutual exclusion:
  - Group 1: B1, B2
  - Group 2: B3, B4, B13, B14
  - Group 3: B7, B8, B9, B10

rules:
  proposal:
    - Keep proposals concise — under 500 words
    - Always include a "Non-goals" section
    - Reference the specific domain entities and services affected
  design:
    - Document decisions with rationale and alternatives considered
    - Call out risks and trade-offs explicitly
    - Respect hexagonal architecture boundaries (dependency flow api → application → domain ← infra)
    - Domain entities must remain free of persistence concerns (no SQLAlchemy imports)
  spec:
    - Include acceptance criteria as testable assertions
    - Specify which architectural layer each change belongs to
    - Reference existing test patterns (domain unit, application integration, API/infra postgres)
  tasks:
    - Break tasks into chunks of max 2 hours
    - Group by architectural layer (domain → application → api/infra)
    - Include test tasks alongside implementation tasks (TDD)
    - Mark domain tasks before application/api tasks (inside-out implementation)
