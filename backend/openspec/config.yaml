schema: spec-driven

context: |
  ## Project
  Vehicle Scheduling System (VSS) — interview assignment for managing railway vehicle
  services on a fixed track network with stations, platforms, blocks, and interlocking constraints.

  ## Tech Stack
  - Backend: Python 3.14 + FastAPI
  - Frontend: Angular (latest stable) — TBD
  - Database: PostgreSQL 17 (Docker)
  - Package manager: uv
  - Containerization: Docker + Docker Compose

  ## Architecture
  Hexagonal Architecture (Ports & Adapters) with DDD.
  Layers: api/ → application/ → domain/ ← infra/
  - api/: FastAPI routes, Pydantic schemas, DI container
  - application/: App services, DTOs, orchestration
  - domain/: Entities, value objects, repository interfaces (ports), domain services
  - infra/: Repository implementations, seed data
  - tests/: Mirrors source structure (domain/, application/, api/, infra/)

  ## Domain Model
  - Block: track segment with traversal time and optional interlocking group (1-3)
  - Station: has platforms (2 each); Yard (Y) is special
  - Platform: P1A, P1B, P2A, P2B, P3A, P3B
  - Service: scheduled vehicle run with path (nodes) and timetable (arrival/departure)
  - Vehicle: V1, V2, V3 — has battery with charge/consume/canDepart methods
  - Node (value object): point in the network (BLOCK, PLATFORM, or YARD)
  - NodeConnection (value object): directed edge in the track graph
  - TimetableEntry (value object): order + node_id + arrival/departure times

  ## Conventions
  - Conventional commits: feat, fix, refactor, docs, test, chore, perf, ci
  - PEP 8 naming (snake_case)
  - TDD: write tests first, then implement
  - Domain entities may use mutation (e.g., Vehicle.charge()) — this is acceptable
  - Pure domain services: no repository dependencies in domain services like ConflictDetector
  - Tests: domain = pure unit, application = integration with in-memory repos, api = TestClient
  - Helper factories: make_block(), make_service_with_window(), seed data utilities

  ## Track Network
  14 blocks (B1-B14), 4 stations (Y, S1, S2, S3), 6 platforms.
  Blocks are unidirectional. Three interlocking groups enforce mutual exclusion:
  - Group 1: B1, B2
  - Group 2: B3, B4, B13, B14
  - Group 3: B7, B8, B9, B10

rules:
  proposal:
    - Keep proposals concise — under 500 words
    - Always include a "Non-goals" section
    - Reference the specific domain entities and services affected
  design:
    - Document decisions with rationale and alternatives considered
    - Call out risks and trade-offs explicitly
    - Respect hexagonal architecture boundaries (dependency flow api → application → domain ← infra)
  spec:
    - Include acceptance criteria as testable assertions
    - Specify which architectural layer each change belongs to
    - Reference existing test patterns (domain unit, application integration, API TestClient)
  tasks:
    - Break tasks into chunks of max 2 hours
    - Group by architectural layer (domain → application → api)
    - Include test tasks alongside implementation tasks (TDD)
    - Mark domain tasks before application/api tasks (inside-out implementation)
