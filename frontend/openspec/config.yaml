schema: spec-driven

context: |
  ## Project
  Vehicle Scheduling System (VSS) Frontend — Angular SPA for managing railway vehicle
  services on a fixed track network with stations, platforms, blocks, and interlocking constraints.

  ## Tech Stack
  - Angular 21 (standalone components, signals)
  - TypeScript 5.9 (strict mode)
  - Tailwind CSS 4 (via PostCSS)
  - RxJS 7.8 (async streams)
  - Vitest 4.0 + jsdom (unit tests)
  - d3.js (interactive track map — bonus)
  - Package manager: npm
  - Linting: ESLint + angular-eslint + typescript-eslint
  - Formatter: Prettier (100 char width, single quotes)

  ## Architecture
  Feature-based structure with standalone components.
  ```
  src/app/
  ├── core/services/  # Singleton API client services
  ├── shared/
  │   ├── models/     # TypeScript interfaces (Block, Service, Node, Graph, Conflict)
  │   └── pipes/      # EpochTimePipe (Unix timestamp → HH:MM:SS)
  ├── features/
  │   ├── schedule-editor/    # Create/edit/delete services with route building
  │   ├── schedule-viewer/    # Read-only schedule display with vehicle filter
  │   ├── block-config/       # Block traversal time inline editing
  │   └── track-map/          # d3.js interactive track visualization (bonus)
  └── app.routes.ts           # Lazy-loaded feature routes
  ```
  - Standalone components (no NgModules)
  - Angular signals for reactive state (signal(), computed())
  - input()/output() for component communication
  - Services use inject(HttpClient) with typed API responses
  - Feature components lazy-loaded via router

  ## Routes
  - /editor → ScheduleEditorComponent (default)
  - /viewer → ScheduleViewerComponent
  - /blocks → BlockConfigComponent
  - /map → TrackMapComponent

  ## Domain Model (API Types)
  - Block: { id: UUID, name: string, group: number, traversal_time_seconds: number }
  - Service list: { id: number, name: string, vehicle_id: UUID, vehicle_name: string }
  - Service detail: { id, name, vehicle_id, route: Node[], timetable: TimetableEntry[], graph: GraphResponse }
  - Node: discriminated union { type: "block" | "platform" | "yard", id: UUID, name: string, x, y }
  - TimetableEntry: { order: number, node_id: UUID, arrival: EpochSeconds, departure: EpochSeconds }
  - Vehicle: { id: UUID, name: string }
  - Station: { id: UUID, name: string, is_yard: boolean, platform_ids: UUID[] }
  - GraphResponse: { nodes: Node[], connections: Connection[], stations: Station[], vehicles: Vehicle[] }

  ## API Integration
  Base URL configured via environment files (src/environments/):
  - Dev (ng serve): http://localhost:8000/api
  - Production (Docker): /api (relative, proxied by nginx)

  Key endpoints:
  - GET /api/vehicles, GET /api/blocks, PATCH /api/blocks/{id}
  - POST /api/services, GET /api/services, GET /api/services/{id}
  - PATCH /api/services/{id}/route (returns 409 with conflict details on conflict)
  - DELETE /api/services/{id}, POST /api/routes/validate

  409 Conflict response fields: vehicle_conflicts, block_conflicts,
  interlocking_conflicts, battery_conflicts (each with type: "low_battery" | "insufficient_charge")

  POST /api/routes/validate request adds vehicle_id field.
  Response: { route: UUID[], battery_conflicts: [{type, service_id}] }

  ## Track Network
  14 blocks (B1-B14), 4 stations (Y, S1, S2, S3), 6 platforms (P1A/B, P2A/B, P3A/B).
  Blocks are unidirectional. Three interlocking groups enforce mutual exclusion:
  - Group 1: B1, B2
  - Group 2: B3, B4, B13, B14
  - Group 3: B7, B8, B9, B10

  ## Conventions
  - Conventional commits: feat, fix, refactor, docs, test, chore, perf, ci
  - Strict TypeScript (no any, no implicit returns, noImplicitOverride)
  - Tailwind utility classes for styling (no component CSS unless necessary)
  - Immutable state updates (create new objects, don't mutate)
  - Services handle API calls; components handle presentation
  - Reactive patterns: signals for synchronous state, observables for async HTTP
  - Component selector prefix: app-

rules:
  proposal:
    - Keep proposals concise — under 500 words
    - Always include a "Non-goals" section
    - Reference the specific Angular components and services affected
  design:
    - Document decisions with rationale and alternatives considered
    - Call out risks and trade-offs explicitly
    - Respect feature-based architecture (core/ → shared/ → features/)
    - Consider component boundaries — smart (container) vs dumb (presentational)
  spec:
    - Include acceptance criteria as testable assertions
    - Specify which feature module each change belongs to
    - Reference existing test patterns (Vitest + TestBed, HttpTestingController)
    - Include accessibility requirements where applicable
  tasks:
    - Break tasks into chunks of max 2 hours
    - Group by feature area, then by layer (service → component → template)
    - Include test tasks alongside implementation tasks (TDD)
    - Create shared models/services before feature components that depend on them
